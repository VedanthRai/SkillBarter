spring.application.name=SkillBarter

# ── Database ──────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/skillbarter_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=mallikarai

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false
# OSIV keeps the persistence context open for Thymeleaf; avoids LazyInitializationException on /dashboard etc.
spring.jpa.open-in-view=true

# ── Thymeleaf ──────────────────────────────────────
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.encoding=UTF-8

# ── File Upload ────────────────────────────────────
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=./uploads/certificates

# ── Mail Configuration ────────────────────────────────────
# Email service enabled for password reset and notifications
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=skillbarter.app@gmail.com
spring.mail.password=your_app_password_here
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
# Note: To use Gmail, generate an App Password at https://myaccount.google.com/apppasswords

# ── PDF Output ─────────────────────────────────────
app.pdf.output.dir=./receipts

# ── Gemini AI ──────────────────────────────────────
gemini.api.key=AIzaSyBAHv30VqqaPNzCqMVqMzlZVw8ZsF7Q4yU
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent

# ── Application Settings ───────────────────────────
app.signup.bonus.credits=5
app.session.escrow.hold.hours=24
app.matching.max.suggestions=5
app.streak.bonus.threshold=7

# ── Server ─────────────────────────────────────────
server.port=8081
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on-param
server.error.include-exception=true

# ── DevTools — disabled (incompatible with JDK 25 CGLIB) ──────────────
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false

# ── Logging ────────────────────────────────────────
logging.level.com.skillbarter=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=WARN
