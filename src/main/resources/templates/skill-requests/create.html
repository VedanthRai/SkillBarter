<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Create Skill Request — SkillBarter</title>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<div th:replace="~{layout :: navbar}"></div>
<main class="page-main">
    <div class="container">
        <h1>Post Skill Request</h1>
        <form th:action="@{/skill-requests/create}" th:object="${requestDto}" method="post">
            <div class="form-group">
                <label>Skill Name *</label>
                <input type="text" th:field="*{skillName}" class="form-control" required/>
            </div>
            <div class="form-group">
                <label>Category *</label>
                <select th:field="*{category}" class="form-control" required>
                    <option value="">Select Category</option>
                    <option value="PROGRAMMING">Programming</option>
                    <option value="DESIGN">Design</option>
                    <option value="MUSIC">Music</option>
                    <option value="LANGUAGE">Language</option>
                    <option value="FITNESS">Fitness</option>
                    <option value="COOKING">Cooking</option>
                    <option value="OTHER">Other</option>
                </select>
            </div>
            <div class="form-group">
                <label>Description *</label>
                <textarea th:field="*{description}" class="form-control" required></textarea>
            </div>
            <div class="form-group">
                <label>Max Credits Willing to Pay</label>
                <input type="number" step="0.01" th:field="*{maxCreditsWilling}" class="form-control"/>
            </div>
            <button type="submit" class="btn btn-primary">Post Request</button>
        </form>
    </div>
</main>
</body>
</html>
