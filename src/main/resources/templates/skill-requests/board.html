<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Skill Request Board — SkillBarter</title>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<div th:replace="~{layout :: navbar}"></div>
<main class="page-main">
    <div class="container">
        <h1>Skill Request Board</h1>
        <a th:href="@{/skill-requests/create}" class="btn btn-primary">Post Request</a>
        <a th:href="@{/skill-requests/my-requests}" class="btn">My Requests</a>
        <div th:each="request : ${requests}" class="card">
            <h3 th:text="${request.skillName}">Skill Name</h3>
            <p th:text="${request.description}">Description</p>
            <p><strong>Category:</strong> <span th:text="${request.category}"></span></p>
            <p><strong>Max Credits:</strong> <span th:text="${request.maxCreditsWilling}"></span></p>
            <form th:action="@{/skill-requests/{id}/offer(id=${request.id})}" method="post">
                <button type="submit" class="btn">Offer to Teach</button>
            </form>
        </div>
    </div>
</main>
</body>
</html>
