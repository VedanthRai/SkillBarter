<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Learning Path — SkillBarter</title>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<div th:replace="~{layout :: navbar}"></div>
<main class="page-main">
    <div class="container">
        <h1 th:text="${path.title}">Path Title</h1>
        <p th:text="${path.description}">Description</p>
        <div th:each="step : ${path.steps}" class="card">
            <h3 th:text="${step.skill.name}">Skill Name</h3>
            <p th:if="${step.completed}">✅ Completed</p>
            <form th:if="${!step.completed}" th:action="@{/learning-paths/{pathId}/steps/{stepId}/complete(pathId=${path.id},stepId=${step.id})}" method="post">
                <button type="submit" class="btn">Mark Complete</button>
            </form>
        </div>
    </div>
</main>
</body>
</html>
