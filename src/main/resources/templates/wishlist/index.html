<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>My Wishlist — SkillBarter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<div th:replace="~{layout :: navbar}"></div>
<main class="page-main">
<div class="container">
    <div th:replace="~{layout :: flashes}"></div>

    <div class="page-hdr">
        <h1>❤️ My Wishlist</h1>
        <a th:href="@{/skills/browse}" class="btn btn-primary">Browse More Skills</a>
    </div>

    <div th:if="${#lists.isEmpty(items)}" class="empty-state large">
        <div class="empty-icon">🔖</div>
        <p>Your wishlist is empty. Save skills you want to learn later!</p>
        <a th:href="@{/skills/browse}" class="btn btn-primary" style="margin-top:16px;">Browse Skills →</a>
    </div>

    <div th:if="${!#lists.isEmpty(items)}" class="skills-grid">
        <div th:each="item : ${items}" class="skill-card">
            <div class="skill-card-header">
                <span class="skill-cat-tag"
                      th:text="${item.skill.category.name().replace('_',' ')}">CAT</span>
                <span th:if="${item.skill.verified}" class="verified-badge">✅ Verified</span>
            </div>
            <div class="skill-name" th:text="${item.skill.name}">Skill</div>
            <div class="skill-desc" th:text="${item.skill.description}">desc</div>

            <div class="skill-meta">
                <div class="skill-teacher">
                    <div class="teacher-avatar"
                         th:text="${item.skill.user.username.substring(0,1).toUpperCase()}">U</div>
                    <span class="teacher-name" th:text="${item.skill.user.username}">teacher</span>
                </div>
                <div class="stars-mini">
                    <span th:each="i : ${#numbers.sequence(1,5)}"
                          th:classappend="${i <= item.skill.averageRating} ? 'star-on' : 'star-off'">★</span>
                    <span class="rating-num"
                          th:text="${#numbers.formatDecimal(item.skill.averageRating,1,1)}">0.0</span>
                </div>
            </div>

            <div class="skill-footer">
                <div class="skill-rate">
                    <span class="rate-num"
                          th:text="${#numbers.formatDecimal(item.skill.hourlyRate,1,1)}">1.0</span>
                    <span class="rate-label">cr/hr</span>
                </div>
                <div style="display:flex;gap:6px;">
                    <a th:href="@{/sessions/request/{id}(id=${item.skill.id})}"
                       class="btn btn-primary btn-xs">Book</a>
                    <form th:action="@{/wishlist/remove/{id}(id=${item.skill.id})}" method="post">
                        <button type="submit" class="btn btn-danger-ghost btn-xs">Remove</button>
                    </form>
                </div>
            </div>
            <div style="font-size:11px;color:var(--text-dim);margin-top:4px;"
                 th:text="'Saved ' + ${#temporals.format(item.savedAt,'dd MMM yyyy')}">date</div>
        </div>
    </div>
</div>
</main>
<div th:replace="~{layout :: footer}"></div>
</body>
</html>
