<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Admin Analytics — SkillBarter</title>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
    <link rel="stylesheet" th:href="@{/css/dark-mode.css}"/>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<div th:replace="~{layout :: navbar}"></div>

<main class="page-main">
    <div class="container">
        <div class="page-hdr">
            <h1>📊 Admin Analytics Dashboard</h1>
            <div class="date-range-selector">
                <a th:href="@{/admin/analytics(days=7)}" 
                   th:classappend="${selectedDays == 7 ? 'active' : ''}" 
                   class="btn btn-ghost">7 Days</a>
                <a th:href="@{/admin/analytics(days=30)}" 
                   th:classappend="${selectedDays == 30 ? 'active' : ''}" 
                   class="btn btn-ghost">30 Days</a>
                <a th:href="@{/admin/analytics(days=90)}" 
                   th:classappend="${selectedDays == 90 ? 'active' : ''}" 
                   class="btn btn-ghost">90 Days</a>
            </div>
        </div>

        <!-- User Growth Chart -->
        <div class="chart-container">
            <h2>User Growth Over Time</h2>
            <canvas id="userGrowthChart"></canvas>
        </div>

        <!-- Two Column Layout -->
        <div class="chart-grid">
            <!-- Sessions by Category -->
            <div class="chart-container">
                <h2>Sessions by Category</h2>
                <canvas id="sessionsCategoryChart"></canvas>
            </div>

            <!-- Peak Usage Hours -->
            <div class="chart-container">
                <h2>Peak Usage Hours</h2>
                <canvas id="peakUsageChart"></canvas>
            </div>
        </div>

        <!-- Credit Flow Chart -->
        <div class="chart-container">
            <h2>Credit Flow (Earned vs Spent)</h2>
            <canvas id="creditFlowChart"></canvas>
        </div>

        <!-- Two Column Layout -->
        <div class="chart-grid">
            <!-- Top Skills by Demand -->
            <div class="chart-container">
                <h2>Top Skills by Demand</h2>
                <canvas id="topSkillsChart"></canvas>
            </div>

            <!-- Completion Rate Trend -->
            <div class="chart-container">
                <h2>Session Completion Rate</h2>
                <canvas id="completionRateChart"></canvas>
            </div>
        </div>
    </div>
</main>

<script th:inline="javascript">
    // User Growth Chart (Line)
    const userGrowthData = /*[[${userGrowthData}]]*/ {};
    new Chart(document.getElementById('userGrowthChart'), {
        type: 'line',
        data: {
            labels: userGrowthData.labels,
            datasets: [{
                label: userGrowthData.label,
                data: userGrowthData.data,
                borderColor: 'rgb(102, 126, 234)',
                backgroundColor: 'rgba(102, 126, 234, 0.1)',
                tension: 0.4,
                fill: true
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { display: true },
                title: { display: false }
            },
            scales: {
                y: { beginAtZero: true }
            }
        }
    });

    // Sessions by Category Chart (Pie)
    const sessionsCategoryData = /*[[${sessionsCategoryData}]]*/ {};
    new Chart(document.getElementById('sessionsCategoryChart'), {
        type: 'pie',
        data: {
            labels: sessionsCategoryData.labels,
            datasets: [{
                data: sessionsCategoryData.data,
                backgroundColor: [
                    'rgb(102, 126, 234)',
                    'rgb(118, 75, 162)',
                    'rgb(237, 100, 166)',
                    'rgb(255, 154, 158)',
                    'rgb(250, 208, 196)',
                    'rgb(255, 223, 186)',
                    'rgb(255, 255, 186)'
                ]
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { position: 'bottom' }
            }
        }
    });

    // Credit Flow Chart (Bar)
    const creditFlowData = /*[[${creditFlowData}]]*/ {};
    new Chart(document.getElementById('creditFlowChart'), {
        type: 'bar',
        data: {
            labels: creditFlowData.labels,
            datasets: [
                {
                    label: 'Credits Earned',
                    data: creditFlowData.earned,
                    backgroundColor: 'rgba(72, 187, 120, 0.8)',
                    borderColor: 'rgb(72, 187, 120)',
                    borderWidth: 1
                },
                {
                    label: 'Credits Spent',
                    data: creditFlowData.spent,
                    backgroundColor: 'rgba(245, 101, 101, 0.8)',
                    borderColor: 'rgb(245, 101, 101)',
                    borderWidth: 1
                }
            ]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { display: true }
            },
            scales: {
                y: { beginAtZero: true }
            }
        }
    });

    // Peak Usage Hours Chart (Bar)
    const peakUsageData = /*[[${peakUsageData}]]*/ {};
    new Chart(document.getElementById('peakUsageChart'), {
        type: 'bar',
        data: {
            labels: peakUsageData.hours.map(h => h + ':00'),
            datasets: [{
                label: 'Sessions',
                data: peakUsageData.counts,
                backgroundColor: 'rgba(102, 126, 234, 0.8)',
                borderColor: 'rgb(102, 126, 234)',
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { display: false }
            },
            scales: {
                y: { beginAtZero: true }
            }
        }
    });

    // Top Skills Chart (Horizontal Bar)
    const topSkillsData = /*[[${topSkillsData}]]*/ {};
    new Chart(document.getElementById('topSkillsChart'), {
        type: 'bar',
        data: {
            labels: topSkillsData.labels,
            datasets: [{
                label: 'Total Sessions',
                data: topSkillsData.data,
                backgroundColor: 'rgba(118, 75, 162, 0.8)',
                borderColor: 'rgb(118, 75, 162)',
                borderWidth: 1
            }]
        },
        options: {
            indexAxis: 'y',
            responsive: true,
            plugins: {
                legend: { display: false }
            },
            scales: {
                x: { beginAtZero: true }
            }
        }
    });

    // Completion Rate Chart (Line)
    const completionRateData = /*[[${completionRateData}]]*/ {};
    new Chart(document.getElementById('completionRateChart'), {
        type: 'line',
        data: {
            labels: completionRateData.labels,
            datasets: [{
                label: completionRateData.label,
                data: completionRateData.data,
                borderColor: 'rgb(72, 187, 120)',
                backgroundColor: 'rgba(72, 187, 120, 0.1)',
                tension: 0.4,
                fill: true
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { display: true }
            },
            scales: {
                y: { 
                    beginAtZero: true,
                    max: 100,
                    ticks: {
                        callback: function(value) {
                            return value + '%';
                        }
                    }
                }
            }
        }
    });
</script>

<style>
.chart-container {
    background: var(--card-bg);
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 30px;
    box-shadow: 0 2px 8px var(--shadow);
}

.chart-container h2 {
    margin-top: 0;
    margin-bottom: 20px;
    font-size: 1.25rem;
    color: var(--text-primary);
}

.chart-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
    gap: 30px;
    margin-bottom: 30px;
}

.date-range-selector {
    display: flex;
    gap: 10px;
}

.date-range-selector .btn.active {
    background: rgba(102, 126, 234, 0.2);
    border-color: rgb(102, 126, 234);
}

@media (max-width: 768px) {
    .chart-grid {
        grid-template-columns: 1fr;
    }
}
</style>

</body>
</html>
