<!DOCTYPE html>

<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Register — SkillBarter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body class="auth-body">
<div class="auth-split">
    <div class="auth-panel-left">
        <div class="auth-brand">
            <span class="brand-icon-lg">⚡</span>
            <h1 class="brand-name-lg">SkillBarter</h1>
        </div>
        <p class="auth-tagline">Join thousands swapping skills — no money needed.</p>
        <div class="auth-steps">
            <div class="step"><span class="step-num">1</span><span>Sign up &amp; get 5 free credits</span></div>
            <div class="step"><span class="step-num">2</span><span>List skills you can teach</span></div>
            <div class="step"><span class="step-num">3</span><span>Book sessions with others</span></div>
            <div class="step"><span class="step-num">4</span><span>Earn &amp; spend time credits</span></div>
        </div>
    </div>
    <div class="auth-panel-right">
        <div class="auth-card">
            <h2 class="auth-title">Create account</h2>
            <p class="auth-subtitle">You'll receive 5 time credits on signup</p>

            <div th:if="${registerError}" class="alert alert-error" th:text="${registerError}"></div>

            <form th:action="@{/auth/register}" method="post"
                  th:object="${registerRequest}" class="auth-form">

                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" th:field="*{username}"
                           placeholder="coolteacher42" autocomplete="username"/>
                    <span class="field-error" th:if="${#fields.hasErrors('username')}"
                          th:errors="*{username}"></span>
                </div>

                <div class="form-group">
                    <label for="email">Email address</label>
                    <input type="email" id="email" th:field="*{email}"
                           placeholder="you@example.com" autocomplete="email"/>
                    <span class="field-error" th:if="${#fields.hasErrors('email')}"
                          th:errors="*{email}"></span>
                </div>

                <div class="form-group">
                    <label for="bio">Short bio <small>(optional)</small></label>
                    <textarea id="bio" th:field="*{bio}" rows="2"
                              placeholder="I teach guitar and love learning languages…"></textarea>
                </div>

                <div class="form-group">
                    <label for="referralCode">Referral Code <small>(optional)</small></label>
                    <input type="text" id="referralCode" th:field="*{referralCode}"
                           placeholder="Enter referral code if you have one"/>
                </div>

                <div class="form-row-2col">
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" th:field="*{password}"
                               placeholder="Min 8 chars" autocomplete="new-password"/>
                        <span class="field-error" th:if="${#fields.hasErrors('password')}"
                              th:errors="*{password}"></span>
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">Confirm</label>
                        <input type="password" id="confirmPassword" th:field="*{confirmPassword}"
                               placeholder="Same again" autocomplete="new-password"/>
                        <span class="field-error" th:if="${#fields.hasErrors('confirmPassword')}"
                              th:errors="*{confirmPassword}"></span>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-full">
                    Create Account — it's free →
                </button>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            </form>

            <p class="auth-switch">
                Already have an account? <a th:href="@{/auth/login}">Sign in</a>
            </p>
        </div>
    </div>
</div>
</body>
</html>
