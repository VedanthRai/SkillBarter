<!DOCTYPE html>

<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login — SkillBarter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body class="auth-body">

<div class="auth-split">
 
    <div class="auth-panel-left">
        <div class="auth-brand">
            <span class="brand-icon-lg">⚡</span>
            <h1 class="brand-name-lg">SkillBarter</h1>
        </div>
        <p class="auth-tagline">Trade time, not money.<br/>Teach what you know. Learn what you need.</p>
        <div class="auth-stats">
            <div class="stat-pill">🎓 Learn any skill</div>
            <div class="stat-pill">💰 Earn time credits</div>
            <div class="stat-pill">🏅 Get verified badges</div>
            <div class="stat-pill">🔥 Build your streak</div>
        </div>
    </div>

    <!-- Right panel — form -->
    <div class="auth-panel-right">
        <div class="auth-card">
            <h2 class="auth-title">Welcome back</h2>
            <p class="auth-subtitle">Sign in to your account</p>

            <div th:if="${loginError}"   class="alert alert-error"   th:text="${loginError}"></div>
            <div th:if="${logoutMsg}"    class="alert alert-info"     th:text="${logoutMsg}"></div>
            <div th:if="${successMsg}"   class="alert alert-success"  th:text="${successMsg}"></div>

            <form th:action="@{/auth/login}" method="post" class="auth-form">
                <div class="form-group">
                    <label for="email">Email address</label>
                    <input type="email" id="email" name="username"
                           placeholder="you@example.com" required autocomplete="email"/>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password"
                           placeholder="••••••••" required autocomplete="current-password"/>
                </div>
                <div class="form-row-split">
                    <label class="checkbox-label">
                        <input type="checkbox" name="remember-me"/> Remember me
                    </label>
                    <a th:href="@{/password-reset}" style="font-size: 0.9rem;">Forgot password?</a>
                </div>
                <button type="submit" class="btn btn-primary btn-full">Sign In →</button>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            </form>

            <p class="auth-switch">
                Don't have an account?
                <a th:href="@{/auth/register}">Create one free</a>
            </p>
        </div>
    </div>
</div>

<link rel="stylesheet" th:href="@{/css/main.css}"/>
</body>
</html>
