<!DOCTYPE html>

<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Edit Profile — SkillBarter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<div th:replace="~{layout :: navbar}"></div>
<main class="page-main">
<div class="container container--narrow">
    <div th:replace="~{layout :: flashes}"></div>
    <h1 style="margin-bottom:24px;">Edit Profile</h1>

    <div class="session-detail-card">
        <form th:action="@{/profile/edit}" method="post" enctype="multipart/form-data">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="form-group">
                <label>Username (read-only)</label>
                <input type="text" th:value="${user.username}" disabled style="opacity:0.5;"/>
            </div>
            <div class="form-group">
                <label>Email (read-only)</label>
                <input type="email" th:value="${user.email}" disabled style="opacity:0.5;"/>
            </div>
            <div class="form-group">
                <label for="bio">Bio</label>
                <textarea id="bio" name="bio" rows="4"
                          th:text="${user.bio}"
                          placeholder="Tell others what you're good at and what you want to learn…"></textarea>
            </div>
            <div class="form-group">
                <label for="timezone">Your Timezone</label>
                <select id="timezone" name="timezone">
                    <option value="UTC"                th:selected="${user.timezone == 'UTC'}">UTC</option>
                    <option value="Asia/Kolkata"       th:selected="${user.timezone == 'Asia/Kolkata'}">Asia/Kolkata (IST, UTC+5:30)</option>
                    <option value="Asia/Dubai"         th:selected="${user.timezone == 'Asia/Dubai'}">Asia/Dubai (GST, UTC+4)</option>
                    <option value="Asia/Singapore"     th:selected="${user.timezone == 'Asia/Singapore'}">Asia/Singapore (SGT, UTC+8)</option>
                    <option value="Asia/Tokyo"         th:selected="${user.timezone == 'Asia/Tokyo'}">Asia/Tokyo (JST, UTC+9)</option>
                    <option value="Europe/London"      th:selected="${user.timezone == 'Europe/London'}">Europe/London (GMT/BST)</option>
                    <option value="Europe/Paris"       th:selected="${user.timezone == 'Europe/Paris'}">Europe/Paris (CET, UTC+1)</option>
                    <option value="America/New_York"   th:selected="${user.timezone == 'America/New_York'}">America/New_York (EST, UTC-5)</option>
                    <option value="America/Chicago"    th:selected="${user.timezone == 'America/Chicago'}">America/Chicago (CST, UTC-6)</option>
                    <option value="America/Los_Angeles" th:selected="${user.timezone == 'America/Los_Angeles'}">America/Los_Angeles (PST, UTC-8)</option>
                    <option value="America/Sao_Paulo"  th:selected="${user.timezone == 'America/Sao_Paulo'}">America/Sao_Paulo (BRT, UTC-3)</option>
                    <option value="Australia/Sydney"   th:selected="${user.timezone == 'Australia/Sydney'}">Australia/Sydney (AEST, UTC+10)</option>
                </select>
                <span style="font-size:12px;color:var(--text-dim);margin-top:4px;">
                    Session times will be shown in your local timezone.
                </span>
            </div>
            <div class="form-group">
                <label for="avatar">Profile Picture</label>
                <input type="file" id="avatar" name="avatar" accept="image/*"/>
            </div>
            <div style="display:flex;gap:12px;margin-top:8px;">
                <button type="submit" class="btn btn-primary">Save Changes</button>
                <a href="/profile" class="btn btn-ghost">Cancel</a>
            </div>
        </form>
    </div>
</div>
</main>
<div th:replace="~{layout :: footer}"></div>
</body>
</html>
