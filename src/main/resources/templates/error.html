<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Error — SkillBarter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<div th:replace="~{layout :: navbar}"></div>
<main class="page-main">
<div class="container container--narrow" style="text-align:center;padding-top:80px;">

    <div style="font-size:72px;margin-bottom:16px;">
        <span th:switch="${status}">
            <span th:case="403">🔒</span>
            <span th:case="404">🔍</span>
            <span th:case="500">💥</span>
            <span th:case="*">⚠️</span>
        </span>
    </div>

    <h1 style="font-size:48px;margin-bottom:8px;" th:text="${status}">Error</h1>

    <p style="font-size:20px;color:var(--text-muted);margin-bottom:8px;"
       th:text="${error}">Something went wrong</p>

    <p style="font-size:14px;color:var(--text-dim);margin-bottom:32px;"
       th:if="${message != null and !message.isEmpty()}"
       th:text="${message}"></p>

    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
        <a href="/dashboard" class="btn btn-primary">← Go to Dashboard</a>
        <a href="javascript:history.back()" class="btn btn-ghost">Go Back</a>
    </div>

    <!-- Dev detail — only shown when message contains exception info -->
    <div th:if="${trace != null}"
         style="margin-top:40px;text-align:left;background:var(--surface);
                border:1px solid var(--border);border-radius:var(--radius);
                padding:20px;font-size:12px;font-family:monospace;
                color:var(--text-muted);overflow-x:auto;max-height:300px;overflow-y:auto;">
        <pre th:text="${trace}"></pre>
    </div>
</div>
</main>
<div th:replace="~{layout :: footer}"></div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
