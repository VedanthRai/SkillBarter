<!DOCTYPE html>

<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>My Skills — SkillBarter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<div th:replace="~{layout :: navbar}"></div>
<main class="page-main">
<div class="container">
    <div th:replace="~{layout :: flashes}"></div>
    <div class="page-hdr"><h1>My Skills</h1></div>

    <div style="display:grid;grid-template-columns:1fr 360px;gap:32px;align-items:start;">

        <!-- Existing skills -->
        <section>
            <div th:if="${#lists.isEmpty(skills)}" class="empty-state large">
                <div class="empty-icon">🎓</div>
                <p>You haven't added any skills yet.</p>
            </div>
            <div th:unless="${#lists.isEmpty(skills)}" class="skills-grid">
                <div th:each="s : ${skills}" class="skill-card">
                    <div class="skill-card-header">
                        <span class="skill-cat-tag" th:text="${s.category.name().replace('_',' ')}">CAT</span>
                        <div style="display:flex;gap:6px;">
                            <span th:if="${s.verified}" class="verified-badge">✅ Verified</span>
                            <span th:if="${!s.verified and s.certificatePath != null}"
                                  class="status-badge status-requested">🔍 Pending</span>
                            <span th:if="${s.isOffering}" class="role-chip role-teacher">Offering</span>
                            <span th:if="${!s.isOffering}" class="role-chip role-learner">Wanted</span>
                        </div>
                    </div>
                    <h3 class="skill-name" th:text="${s.name}">Skill</h3>
                    <p class="skill-desc" th:text="${s.description ?: 'No description.'}">desc</p>
                    <div class="skill-footer">
                        <span class="rate-num" th:text="${#numbers.formatDecimal(s.hourlyRate,1,1)}">1.0</span>
                        <span class="rate-label">cr/hr</span>
                        <form th:action="@{/skills/{id}/delete(id=${s.id})}" method="post"
                              style="margin-left:auto"
                              onsubmit="return confirm('Delete this skill?')">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button class="btn btn-danger-ghost btn-xs">Delete</button>
                        </form>
                    </div>
                </div>
            </div>
        </section>

        <!-- Add skill form -->
        <aside class="dash-section" style="position:sticky;top:76px;">
            <h2 class="section-title">+ Add a Skill</h2>
            <form th:action="@{/skills/add}" method="post" enctype="multipart/form-data"
                  th:object="${skillDto}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div class="form-group">
                    <label>Skill Name *</label>
                    <input type="text" th:field="*{name}" placeholder="e.g. Python, Guitar, French…"/>
                    <span class="field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
                </div>
                <div class="form-group">
                    <label>Category *</label>
                    <select th:field="*{category}">
                        <option value="">— Select —</option>
                        <option th:each="cat : ${categories}" th:value="${cat}"
                                th:text="${cat.name().replace('_',' ')}">CAT</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea th:field="*{description}" id="skillDesc" rows="2" placeholder="What will you teach?"></textarea>
                    <button type="button" class="btn btn-ghost btn-xs" style="margin-top:6px;"
                            onclick="aiImproveDesc()">🤖 Improve with AI</button>
                    <div id="aiDescLoading" style="display:none;font-size:12px;color:var(--text-muted);margin-top:4px;">⏳ Generating...</div>
                </div>
                <div class="form-group">
                    <label>Proficiency Level</label>
                    <select th:field="*{proficiencyLevel}">
                        <option value="">— Select —</option>
                        <option value="BEGINNER">Beginner</option>
                        <option value="INTERMEDIATE">Intermediate</option>
                        <option value="ADVANCED">Advanced</option>
                        <option value="EXPERT">Expert</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Rate (credits/hour)</label>
                    <input type="number" step="0.5" min="0.5" max="10"
                           th:field="*{hourlyRate}" placeholder="1.0"/>
                </div>
                <div class="form-group">
                    <label>Offering or Wanted?</label>
                    <select th:field="*{isOffering}">
                        <option value="true">I can teach this skill</option>
                        <option value="false">I want to learn this skill</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Certificate (optional — for verification)</label>
                    <input type="file" name="certificate" accept=".pdf,.jpg,.jpeg,.png"/>
                </div>
                <button type="submit" class="btn btn-primary btn-full">Add Skill →</button>
            </form>
        </aside>
    </div>
</div>
</main>
<div th:replace="~{layout :: footer}"></div>
<script>
async function aiImproveDesc() {
    const nameEl = document.querySelector('input[name="name"]');
    const descEl = document.getElementById('skillDesc');
    const skillName = nameEl ? nameEl.value.trim() : '';
    const description = descEl ? descEl.value.trim() : '';
    if (!skillName) { alert('Enter a skill name first.'); return; }
    document.getElementById('aiDescLoading').style.display = 'block';
    const csrf = document.querySelector('meta[name="_csrf"]');
    try {
        const res = await fetch('/ai/improve-description', {
            method: 'POST',
            headers: {'Content-Type':'application/json',
                      'X-CSRF-TOKEN': csrf ? csrf.content : ''},
            body: JSON.stringify({skillName, description})
        });
        const data = await res.json();
        if (descEl && data.improved) descEl.value = data.improved;
    } catch(e) { alert('AI unavailable. Try again.'); }
    finally { document.getElementById('aiDescLoading').style.display = 'none'; }
}
</script>
</body>
</html>
