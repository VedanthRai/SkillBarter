<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Browse Skills — SkillBarter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<div th:replace="~{layout :: navbar}"></div>
<main class="page-main">
<div class="container">
    <!-- Search bar -->
    <div class="browse-hero">
        <h1>Find a Skill</h1>
        <form th:action="@{/skills/search}" method="get" class="search-form">
            <input type="text" name="q" th:value="${keyword}"
                   placeholder="Search by skill, e.g. Python, Guitar, Spanish…" class="search-input"/>
            <select name="strategy" class="search-select">
                <option value="ratingBasedStrategy">Top Rated</option>
                <option value="affordabilityStrategy">Most Affordable</option>
                <option value="verifiedOnlyStrategy">Verified Only</option>
            </select>
            <button type="submit" class="btn btn-primary">Search</button>
        </form>
    </div>

    <!-- Category pills -->
    <div class="cat-pills">
        <a th:href="@{/skills/browse}" class="cat-pill"
           th:classappend="${selectedCategory == null} ? 'cat-pill--active' : ''">All</a>
        <a th:each="cat : ${categories}"
           th:href="@{/skills/browse(category=${cat})}"
           class="cat-pill"
           th:classappend="${selectedCategory == cat} ? 'cat-pill--active' : ''"
           th:text="${cat.name().replace('_',' ')}">Category</a>
    </div>

    <!-- Results grid -->
    <div th:if="${#lists.isEmpty(skills)}" class="empty-state large">
        <div class="empty-icon">🔍</div>
        <p>No skills found. Try a different keyword or category.</p>
    </div>

    <div class="skills-grid" th:unless="${#lists.isEmpty(skills)}">
        <div th:each="skill : ${skills}" class="skill-card">
            <div class="skill-card-header">
                <span class="skill-cat-tag" th:text="${skill.category.name().replace('_',' ')}">CAT</span>
                <span th:if="${skill.verified}" class="verified-badge">✅ Verified</span>
            </div>
            <h3 class="skill-name" th:text="${skill.name}">Skill Name</h3>
            <p class="skill-desc" th:text="${skill.description != null ? skill.description : 'No description.'}">desc</p>

            <div class="skill-meta">
                <div class="skill-teacher">
                    <span class="teacher-avatar" th:text="${skill.user.username.substring(0,1).toUpperCase()}">U</span>
                    <a th:href="@{/profile/{id}(id=${skill.user.id})}"
                       class="teacher-name" th:text="${skill.user.username}">user</a>
                </div>
                <div class="skill-rating">
                    <span class="stars-mini">
                        <span th:each="i : ${#numbers.sequence(1,5)}"
                              th:classappend="${i <= skill.averageRating} ? 'star-on' : 'star-off'">★</span>
                    </span>
                    <span class="rating-num" th:text="${#numbers.formatDecimal(skill.averageRating,1,1)}">0.0</span>
                </div>
            </div>

            <div class="skill-footer">
                <div class="skill-rate">
                    <span class="rate-num" th:text="${#numbers.formatDecimal(skill.hourlyRate,1,1)}">1.0</span>
                    <span class="rate-label">cr/hr</span>
                </div>
                <div style="display:flex;gap:6px;">
                    <a th:href="@{/skills/{id}(id=${skill.id})}" class="btn btn-ghost btn-sm">View</a>
                    <a th:href="@{/sessions/request/{id}(id=${skill.id})}"
                       class="btn btn-primary btn-sm">Book →</a>
                </div>
            </div>
        </div>
    </div>
</div>
</main>
<div th:replace="~{layout :: footer}"></div>
<div th:replace="~{layout :: skillbot-fab}"></div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
