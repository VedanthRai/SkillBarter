<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="'Dispute #' + ${dispute.id} + ' — SkillBarter'">Dispute</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<div th:replace="~{layout :: navbar}"></div>
<main class="page-main">
<div class="container container--narrow">
    <div th:replace="~{layout :: flashes}"></div>

    <div class="session-detail-card">
        <div class="sd-header">
            <div>
                <h1>⚖️ Dispute #<span th:text="${dispute.id}">0</span></h1>
                <span class="status-badge status-lg"
                      th:classappend="'status-' + ${dispute.status.name().toLowerCase().replace('_','-')}"
                      th:text="${dispute.status}">STATUS</span>
            </div>
        </div>

        <!-- Session reference -->
        <div class="sd-details">
            <div class="detail-row">
                <span class="detail-label">Session</span>
                <a th:href="@{/sessions/{id}(id=${dispute.session.id})}"
                   th:text="'Session #' + ${dispute.session.id} + ' — ' + ${dispute.session.skill.name}">link</a>
            </div>
            <div class="detail-row">
                <span class="detail-label">Raised by</span>
                <span th:text="${dispute.raisedBy.username}">user</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Raised on</span>
                <span th:text="${#temporals.format(dispute.createdAt,'dd MMM yyyy, HH:mm')}">date</span>
            </div>
            <div class="detail-row" th:if="${dispute.assignedVerifier != null}">
                <span class="detail-label">Verifier</span>
                <span th:text="${dispute.assignedVerifier.username}">verifier</span>
            </div>
        </div>

        <!-- Description -->
        <div class="dash-section" style="margin-top:20px;">
            <h3 style="margin-bottom:10px;">Issue Description</h3>
            <p th:text="${dispute.description}" style="color:var(--text-muted);line-height:1.7;">desc</p>
        </div>

        <!-- Evidence -->
        <div class="dash-section" th:if="${dispute.evidence != null and !dispute.evidence.isEmpty()}">
            <h3 style="margin-bottom:10px;">Evidence</h3>
            <p th:text="${dispute.evidence}" style="color:var(--text-muted);line-height:1.7;">evidence</p>
        </div>

        <!-- Resolution -->
        <div class="dash-section" th:if="${dispute.resolution != null}">
            <h3 style="margin-bottom:10px;">Verifier's Ruling</h3>
            <p th:text="${dispute.resolution}" style="color:var(--text-muted);line-height:1.7;">resolution</p>
        </div>

        <!-- Verifier actions -->
        <div th:if="${isVerifier and dispute.status.name() == 'UNDER_REVIEW'
                     and dispute.assignedVerifier != null
                     and dispute.assignedVerifier.id == userId}"
             class="sd-review-form" style="margin-top:24px;">
            <h3 style="margin-bottom:16px;">Deliver Ruling</h3>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
                <form th:action="@{/disputes/resolve/{id}/teacher(id=${dispute.id})}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <textarea name="resolution" rows="4" class="review-textarea"
                              placeholder="State your ruling in favour of the TEACHER…" required></textarea>
                    <button type="submit" class="btn btn-success btn-full">
                        ✅ Rule in favour of Teacher
                    </button>
                </form>
                <form th:action="@{/disputes/resolve/{id}/learner(id=${dispute.id})}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <textarea name="resolution" rows="4" class="review-textarea"
                              placeholder="State your ruling in favour of the LEARNER…" required></textarea>
                    <button type="submit" class="btn btn-accent btn-full">
                        ✅ Rule in favour of Learner
                    </button>
                </form>
            </div>
        </div>

        <div style="margin-top:20px;">
            <a href="/disputes" class="btn btn-ghost">← Back to Disputes</a>
        </div>
    </div>
</div>
</main>
<div th:replace="~{layout :: footer}"></div>
<div th:replace="~{layout :: skillbot-fab}"></div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
