<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Add Availability — SkillBarter</title>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<div th:replace="~{layout :: navbar}"></div>
<main class="page-main">
    <div class="container">
        <h1>Add Availability Slot</h1>
        <form th:action="@{/availability/add}" th:object="${slotDto}" method="post">
            <div class="form-group">
                <label>Day of Week *</label>
                <select th:field="*{dayOfWeek}" class="form-control" required>
                    <option value="MONDAY">Monday</option>
                    <option value="TUESDAY">Tuesday</option>
                    <option value="WEDNESDAY">Wednesday</option>
                    <option value="THURSDAY">Thursday</option>
                    <option value="FRIDAY">Friday</option>
                    <option value="SATURDAY">Saturday</option>
                    <option value="SUNDAY">Sunday</option>
                </select>
            </div>
            <div class="form-group">
                <label>Start Time *</label>
                <input type="time" th:field="*{startTime}" class="form-control" required/>
            </div>
            <div class="form-group">
                <label>End Time *</label>
                <input type="time" th:field="*{endTime}" class="form-control" required/>
            </div>
            <button type="submit" class="btn btn-primary">Add Slot</button>
        </form>
    </div>
</main>
</body>
</html>
