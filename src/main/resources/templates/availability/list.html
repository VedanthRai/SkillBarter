<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>My Availability — SkillBarter</title>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<div th:replace="~{layout :: navbar}"></div>
<main class="page-main">
    <div class="container">
        <h1>My Teaching Availability</h1>
        <a th:href="@{/availability/add}" class="btn btn-primary">Add Time Slot</a>
        <div th:each="slot : ${slots}" class="card">
            <p><strong>Day:</strong> <span th:text="${slot.dayOfWeek}"></span></p>
            <p><strong>Time:</strong> <span th:text="${slot.startTime}"></span> - <span th:text="${slot.endTime}"></span></p>
            <form th:action="@{/availability/{id}/delete(id=${slot.id})}" method="post">
                <button type="submit" class="btn btn-danger">Delete</button>
            </form>
        </div>
    </div>
</main>
</body>
</html>
