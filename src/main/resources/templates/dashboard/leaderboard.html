<!DOCTYPE html>

<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Leaderboard — SkillBarter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<div th:replace="~{layout :: navbar}"></div>
<main class="page-main">
<div class="container">
    <div class="page-hdr">
        <h1>🏆 Leaderboard</h1>
    </div>

    <div class="dash-two-col">
        
        <section class="dash-section">
            <h2 class="section-title">⭐ Top by Reputation</h2>
            <div th:each="u, stat : ${topReputation}" class="lb-entry"
                 th:classappend="${stat.index == 0} ? 'lb-entry--gold' :
                                 (${stat.index == 1} ? 'lb-entry--silver' : '')">
                <span class="lb-rank">
                    <span th:if="${stat.index == 0}">🥇</span>
                    <span th:if="${stat.index == 1}">🥈</span>
                    <span th:if="${stat.index == 2}">🥉</span>
                    <span th:if="${stat.index >= 3}" th:text="${stat.index + 1}">#</span>
                </span>
                <a th:href="@{/profile/{id}(id=${u.id})}" class="lb-name"
                   th:text="${u.username}">user</a>
                <span class="lb-meta" th:text="${u.totalSessionsCompleted} + ' sessions'">0</span>
                <span class="lb-score" th:text="${u.reputationScore} + ' pts'">0</span>
            </div>
        </section>

        <!-- Streak leaderboard -->
        <section class="dash-section">
            <h2 class="section-title">🔥 Top Streaks</h2>
            <div th:each="u, stat : ${topStreak}" class="lb-entry"
                 th:classappend="${stat.index == 0} ? 'lb-entry--gold' :
                                 (${stat.index == 1} ? 'lb-entry--silver' : '')">
                <span class="lb-rank">
                    <span th:if="${stat.index == 0}">🥇</span>
                    <span th:if="${stat.index == 1}">🥈</span>
                    <span th:if="${stat.index == 2}">🥉</span>
                    <span th:if="${stat.index >= 3}" th:text="${stat.index + 1}">#</span>
                </span>
                <a th:href="@{/profile/{id}(id=${u.id})}" class="lb-name"
                   th:text="${u.username}">user</a>
                <span class="lb-score" style="color:var(--accent)"
                      th:text="${u.streakCount} + ' day streak'">0</span>
            </div>
        </section>
    </div>
</div>
</main>
<div th:replace="~{layout :: footer}"></div>
</body>
</html>
