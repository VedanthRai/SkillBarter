<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Notifications — SkillBarter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<div th:replace="~{layout :: navbar}"></div>
<main class="page-main">
<div class="container container--narrow">
    <div th:replace="~{layout :: flashes}"></div>
    <div class="page-hdr">
        <h1>🔔 Notifications</h1>
        <form th:action="@{/notifications/read-all}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn btn-ghost btn-sm">Mark all read</button>
        </form>
    </div>

    <div th:if="${#lists.isEmpty(notifications)}" class="empty-state large">
        <div class="empty-icon">🔔</div>
        <p>No notifications yet.</p>
    </div>

    <div class="notif-list" th:unless="${#lists.isEmpty(notifications)}">
        <div th:each="n : ${notifications}"
             class="notif-item"
             th:classappend="${!n.isRead} ? 'notif-item--unread' : ''">
            <div class="notif-icon">
                <span th:switch="${n.type.name()}">
                    <span th:case="'SESSION_REQUEST'">📬</span>
                    <span th:case="'SESSION_ACCEPTED'">✅</span>
                    <span th:case="'SESSION_CANCELLED'">❌</span>
                    <span th:case="'PAYMENT_ESCROWED'">🔒</span>
                    <span th:case="'PAYMENT_RELEASED'">💸</span>
                    <span th:case="'PAYMENT_REFUNDED'">↩️</span>
                    <span th:case="'DISPUTE_OPENED'">⚖️</span>
                    <span th:case="'DISPUTE_RESOLVED'">⚖️</span>
                    <span th:case="'BADGE_AWARDED'">🏅</span>
                    <span th:case="'ADMIN_MESSAGE'">📢</span>
                    <span th:case="'ENDORSEMENT_RECEIVED'">👍</span>
                    <span th:case="'WISHLIST_ALERT'">🔔</span>
                    <span th:case="*">🔔</span>
                </span>
            </div>
            <div class="notif-body">
                <p class="notif-msg" th:text="${n.message}">message</p>
                <span class="notif-time"
                      th:text="${#temporals.format(n.createdAt,'dd MMM yyyy, HH:mm')}">time</span>
            </div>
            <div class="notif-actions">
                <a th:if="${n.actionUrl != null}" th:href="${n.actionUrl}"
                   class="btn btn-ghost btn-xs">View →</a>
            </div>
        </div>
    </div>
</div>
</main>
<div th:replace="~{layout :: footer}"></div>
<div th:replace="~{layout :: skillbot-fab}"></div>
<script th:src="@{/js/app.js}"></script>

<style>
.notif-list { display:flex; flex-direction:column; gap:2px; }
.notif-item {
  display:flex; align-items:flex-start; gap:16px;
  padding:16px; border-radius:var(--radius);
  background:var(--surface); border:1px solid var(--border);
  transition:background 0.15s;
}
.notif-item--unread { border-left:3px solid var(--primary); background:rgba(99,102,241,0.05); }
.notif-icon { font-size:22px; flex-shrink:0; margin-top:2px; }
.notif-body { flex:1; }
.notif-msg  { font-size:14px; margin-bottom:4px; }
.notif-time { font-size:12px; color:var(--text-muted); }
.notif-actions { flex-shrink:0; }
</style>
</body>
</html>
