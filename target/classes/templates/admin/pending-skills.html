<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Pending Verifications — SkillBarter Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<div th:replace="~{layout :: navbar}"></div>
<main class="page-main">
<div class="container">
    <div th:replace="~{layout :: flashes}"></div>
    <div class="page-hdr">
        <h1>🏅 Pending Skill Verifications</h1>
        <a th:href="@{/admin}" class="btn btn-ghost">← Admin Home</a>
    </div>

    <div th:if="${#lists.isEmpty(skills)}" class="empty-state large">
        <div class="empty-icon">✅</div>
        <p>All skills verified — nothing pending.</p>
    </div>

    <div class="skills-grid" th:unless="${#lists.isEmpty(skills)}">
        <div th:each="s : ${skills}" class="skill-card">
            <div class="skill-card-header">
                <span class="skill-cat-tag" th:text="${s.category.name().replace('_',' ')}">CAT</span>
                <span class="status-badge status-requested">🔍 Needs Review</span>
            </div>
            <h3 class="skill-name" th:text="${s.name}">Skill</h3>
            <p class="skill-desc" th:text="${s.description ?: 'No description'}">desc</p>
            <div class="detail-row" style="border:none;padding:0;font-size:13px;">
                <span class="detail-label">Submitted by</span>
                <a th:href="@{/profile/{id}(id=${s.user.id})}" th:text="${s.user.username}">user</a>
            </div>
            <div class="detail-row" style="border:none;padding:4px 0;font-size:13px;">
                <span class="detail-label">Certificate</span>
                <span th:text="${s.certificatePath}">path</span>
            </div>
            <div class="skill-footer" style="margin-top:12px;">
                <form th:action="@{/admin/skills/{id}/verify(id=${s.id})}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <input type="hidden" name="verifierId" th:value="${currentUserId}"/>
                    <button type="submit" class="btn btn-primary btn-sm">
                        ✅ Approve &amp; Award Badge
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
</main>
<div th:replace="~{layout :: footer}"></div>
</body>
</html>
