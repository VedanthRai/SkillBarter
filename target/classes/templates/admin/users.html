<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Manage Users — SkillBarter Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<div th:replace="~{layout :: navbar}"></div>
<main class="page-main">
<div class="container">
    <div th:replace="~{layout :: flashes}"></div>
    <div class="page-hdr">
        <h1>👥 Manage Users</h1>
        <a th:href="@{/admin}" class="btn btn-ghost">← Admin Home</a>
    </div>

    <div class="sessions-table-wrap">
        <table class="data-table">
            <thead>
            <tr>
                <th>ID</th><th>Username</th><th>Email</th><th>Role</th>
                <th>Status</th><th>Credits</th><th>Sessions</th><th>Joined</th><th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="u : ${users}">
                <td th:text="${u.id}">1</td>
                <td><a th:href="@{/profile/{id}(id=${u.id})}" th:text="${u.username}">user</a></td>
                <td th:text="${u.email}">email</td>
                <td><span class="role-chip"
                          th:classappend="${u.role.name() == 'ROLE_ADMIN'} ? 'role-teacher' :
                                          (${u.role.name() == 'ROLE_VERIFIER'} ? '' : 'role-learner')"
                          th:text="${u.role.name().replace('ROLE_','')}">ROLE</span></td>
                <td><span class="status-badge"
                          th:classappend="'status-' + ${u.status.name().toLowerCase()}"
                          th:text="${u.status}">STATUS</span></td>
                <td th:text="${#numbers.formatDecimal(u.creditBalance,1,2)}">0</td>
                <td th:text="${u.totalSessionsCompleted}">0</td>
                <td th:text="${#temporals.format(u.createdAt,'dd MMM yy')}">date</td>
                <td class="action-cell">
                    <form th:action="@{/admin/users/{id}/suspend(id=${u.id})}" method="post"
                          style="display:inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button class="btn btn-ghost btn-xs"
                                th:if="${u.status.name() == 'ACTIVE'}">Suspend</button>
                    </form>
                    <form th:action="@{/admin/users/{id}/ban(id=${u.id})}" method="post"
                          style="display:inline"
                          onsubmit="return confirm('Ban this user?')">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button class="btn btn-danger-ghost btn-xs"
                                th:if="${u.status.name() != 'BANNED'}">Ban</button>
                    </form>
                    <form th:action="@{/admin/users/{id}/reinstate(id=${u.id})}" method="post"
                          style="display:inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button class="btn btn-ghost btn-xs"
                                th:if="${u.status.name() != 'ACTIVE'}">Reinstate</button>
                    </form>
                    <form th:action="@{/admin/users/{id}/make-verifier(id=${u.id})}" method="post"
                          style="display:inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button class="btn btn-ghost btn-xs"
                                th:if="${u.role.name() == 'ROLE_USER'}">→ Verifier</button>
                    </form>
                    <!-- Grant Credits -->
                    <button class="btn btn-accent btn-xs"
                            onclick="openGrantModal([[${u.id}]], '[[${u.username}]]')">+ Credits</button>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</main>
<div th:replace="~{layout :: footer}"></div>

<!-- Grant Credits Modal -->
<div class="modal-overlay" id="grantModal" style="display:none;" onclick="closeGrantModal(event)">
    <div class="modal-card" onclick="event.stopPropagation()">
        <h2 style="margin-bottom:16px;">💰 Grant Credits</h2>
        <p id="grantModalTitle" style="color:var(--text-muted);margin-bottom:16px;font-size:14px;"></p>
        <form id="grantForm" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="form-group">
                <label>Amount (credits)</label>
                <input type="number" name="amount" min="0.5" step="0.5" value="5"
                       class="search-input" style="width:100%;"/>
            </div>
            <div class="form-group">
                <label>Reason</label>
                <input type="text" name="reason" value="Admin grant"
                       class="search-input" style="width:100%;"/>
            </div>
            <div style="display:flex;gap:10px;margin-top:16px;">
                <button type="submit" class="btn btn-primary">Grant Credits</button>
                <button type="button" class="btn btn-ghost" onclick="closeGrantModal()">Cancel</button>
            </div>
        </form>
    </div>
</div>

<style>
.modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.6);
  display:flex; align-items:center; justify-content:center; z-index:200;
}
.modal-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius-xl); padding:32px;
  width:100%; max-width:440px;
}
</style>
<script>
function openGrantModal(userId, username) {
    document.getElementById('grantModalTitle').textContent = 'Granting credits to: ' + username;
    document.getElementById('grantForm').action = '/admin/users/' + userId + '/grant-credits';
    document.getElementById('grantModal').style.display = 'flex';
}
function closeGrantModal(e) {
    if (!e || e.target === document.getElementById('grantModal')) {
        document.getElementById('grantModal').style.display = 'none';
    }
}
</script>
</body>
</html>
