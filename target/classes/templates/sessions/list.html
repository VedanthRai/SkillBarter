<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>My Sessions — SkillBarter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<div th:replace="~{layout :: navbar}"></div>
<main class="page-main">
<div class="container">
    <div th:replace="~{layout :: flashes}"></div>
    <div class="page-hdr">
        <h1>My Sessions</h1>
        <a th:href="@{/skills/browse}" class="btn btn-primary">+ Book New Session</a>
    </div>

    <!-- Filter tabs -->
    <div class="tab-strip" id="sessionTabs">
        <button class="tab active" data-filter="all">All</button>
        <button class="tab" data-filter="REQUESTED">Requested</button>
        <button class="tab" data-filter="ACCEPTED">Accepted</button>
        <button class="tab" data-filter="IN_PROGRESS">In Progress</button>
        <button class="tab" data-filter="COMPLETED">Completed</button>
        <button class="tab" data-filter="CANCELLED">Cancelled</button>
        <button class="tab" data-filter="DISPUTED">Disputed</button>
    </div>

    <div th:if="${#lists.isEmpty(sessions)}" class="empty-state large">
        <div class="empty-icon">📭</div>
        <p>No sessions yet.</p>
        <a th:href="@{/skills/browse}" class="btn btn-primary">Browse available skills →</a>
    </div>

    <div class="sessions-table-wrap" th:unless="${#lists.isEmpty(sessions)}">
        <table class="data-table">
            <thead>
            <tr>
                <th>Skill</th><th>Role</th><th>With</th><th>Scheduled</th>
                <th>Duration</th><th>Credits</th><th>Status</th><th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="s : ${sessions}"
                th:attr="data-status=${s.status}">
                <td><strong th:text="${s.skill.name}">Skill</strong>
                    <span th:if="${s.skill.verified}" class="verified-chip">✅</span></td>
                <td>
                    <span th:if="${s.learner.id == userId}" class="role-chip role-learner">Learner</span>
                    <span th:if="${s.teacher.id == userId}" class="role-chip role-teacher">Teacher</span>
                </td>
                <td>
                    <span th:if="${s.learner.id == userId}" th:text="${s.teacher.username}">teacher</span>
                    <span th:if="${s.teacher.id == userId}" th:text="${s.learner.username}">learner</span>
                </td>
                <td th:text="${#temporals.format(s.scheduledAt,'dd MMM yyyy, HH:mm')}">date</td>
                <td th:text="${s.durationMinutes} + ' min'">60 min</td>
                <td th:text="${#numbers.formatDecimal(s.creditAmount,1,2)}">1.00</td>
                <td>
                    <span class="status-badge"
                          th:classappend="'status-' + ${s.status.name().toLowerCase()}"
                          th:text="${s.status}">STATUS</span>
                </td>
                <td>
                    <a th:href="@{/sessions/{id}(id=${s.id})}" class="btn btn-ghost btn-xs">View</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</main>
<div th:replace="~{layout :: footer}"></div>
<div th:replace="~{layout :: skillbot-fab}"></div>
<script th:src="@{/js/app.js}"></script>
<script>
document.querySelectorAll('#sessionTabs .tab').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('#sessionTabs .tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const filter = btn.dataset.filter;
        document.querySelectorAll('.data-table tbody tr').forEach(row => {
            row.style.display = (filter === 'all' || row.dataset.status === filter) ? '' : 'none';
        });
    });
});
</script>
</body>
</html>
