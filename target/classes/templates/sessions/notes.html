<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Session Notes — SkillBarter</title>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<div th:replace="~{layout :: navbar}"></div>
<main class="page-main">
    <div class="container">
        <h1>Session Notes</h1>
        <a th:href="@{/sessions/{id}/notes/add(id=${sessionId})}" class="btn btn-primary">Add Notes</a>
        <div th:each="note : ${notes}" class="card">
            <h3 th:text="${note.addedBy.username}">User</h3>
            <p><strong>Key Takeaways:</strong> <span th:text="${note.keyTakeaways}"></span></p>
            <p th:if="${note.homework}"><strong>Homework:</strong> <span th:text="${note.homework}"></span></p>
            <p th:if="${note.resourcesShared}"><strong>Resources:</strong> <span th:text="${note.resourcesShared}"></span></p>
        </div>
    </div>
</main>
</body>
</html>
