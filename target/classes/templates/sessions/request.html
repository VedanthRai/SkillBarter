<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Request Session — SkillBarter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<div th:replace="~{layout :: navbar}"></div>
<main class="page-main">
<div class="container container--narrow">
    <div th:replace="~{layout :: flashes}"></div>
    <h1 style="margin-bottom:24px;">Book a Session</h1>

    <div class="session-detail-card">
        <form th:action="@{/sessions/request}" method="post"
              th:object="${sessionRequest}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <input type="hidden" name="skillId" th:value="${skillId}"/>

            <div class="form-group">
                <label for="scheduledAt">Scheduled Date &amp; Time</label>
                <input type="datetime-local" id="scheduledAt"
                       th:field="*{scheduledAt}" required/>
                <span class="field-error" th:if="${#fields.hasErrors('scheduledAt')}"
                      th:errors="*{scheduledAt}"></span>
            </div>

            <div class="form-group">
                <label for="durationMinutes">Duration (minutes)</label>
                <select id="durationMinutes" th:field="*{durationMinutes}">
                    <option value="30">30 minutes — 0.5 credits</option>
                    <option value="60" selected>1 hour — 1 credit</option>
                    <option value="90">1.5 hours — 1.5 credits</option>
                    <option value="120">2 hours — 2 credits</option>
                    <option value="180">3 hours — 3 credits</option>
                </select>
            </div>

            <div class="form-group">
                <label for="notes">Notes for teacher <small>(optional)</small></label>
                <textarea id="notes" th:field="*{notes}" rows="3"
                          placeholder="What specific topics would you like to cover?"></textarea>
            </div>

            <div style="display:flex;gap:12px;margin-top:8px;">
                <button type="submit" class="btn btn-primary">
                    ⚡ Confirm &amp; Escrow Credits →
                </button>
                <a href="/skills/browse" class="btn btn-ghost">Cancel</a>
            </div>
        </form>
    </div>
</div>
</main>
<div th:replace="~{layout :: footer}"></div>
</body>
</html>
