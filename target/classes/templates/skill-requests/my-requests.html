<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>My Skill Requests — SkillBarter</title>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<div th:replace="~{layout :: navbar}"></div>
<main class="page-main">
    <div class="container">
        <h1>My Skill Requests</h1>
        <div th:each="request : ${requests}" class="card">
            <h3 th:text="${request.skillName}">Skill Name</h3>
            <p><strong>Status:</strong> <span th:text="${request.status}"></span></p>
            <form th:if="${request.status.name() == 'OPEN'}" th:action="@{/skill-requests/{id}/close(id=${request.id})}" method="post">
                <button type="submit" class="btn">Close Request</button>
            </form>
        </div>
    </div>
</main>
</body>
</html>
