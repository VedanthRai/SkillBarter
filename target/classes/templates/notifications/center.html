<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Notification Center — SkillBarter</title>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
    <link rel="stylesheet" th:href="@{/css/dark-mode.css}"/>
</head>
<body>
<div th:replace="~{layout :: navbar}"></div>

<main class="page-main">
    <div class="container">
        <div class="notif-header">
            <div>
                <h1>🔔 Notification Center</h1>
                <p class="subtitle">
                    <span th:text="${unreadCount}">0</span> unread notifications
                </p>
            </div>
            <div class="notif-actions">
                <button onclick="markAllRead()" class="btn btn-ghost">
                    ✓ Mark all as read
                </button>
                <button onclick="toggleFilter()" class="btn btn-ghost">
                    🔍 Filter
                </button>
            </div>
        </div>

        <!-- Filter Panel -->
        <div id="filter-panel" class="filter-panel" style="display: none;">
            <h3>Filter by Type</h3>
            <div class="filter-buttons">
                <button onclick="filterNotifications('all')" class="filter-btn active">All</button>
                <button th:each="type : ${types}" 
                        th:onclick="'filterNotifications(\'' + ${type} + '\')'"
                        class="filter-btn"
                        th:text="${type}">Type</button>
            </div>
        </div>

        <!-- Unread Notifications -->
        <section th:if="${!unreadNotifications.isEmpty()}" class="notif-section">
            <h2>📬 Unread (<span th:text="${unreadCount}">0</span>)</h2>
            <div class="notif-list">
                <div th:each="notif : ${unreadNotifications}" class="notif-item unread">
                    <div class="notif-icon" th:text="${getNotifIcon(notif.type)}">🔔</div>
                    <div class="notif-content">
                        <div class="notif-header">
                            <h3 th:text="${notif.message}">Notification message</h3>
                            <span class="notif-time" th:text="${#temporals.format(notif.createdAt, 'dd MMM, HH:mm')}">Time</span>
                        </div>
                        <span class="notif-type" th:text="${notif.type}">Type</span>
                        <div class="notif-actions-inline">
                            <a th:if="${notif.actionUrl != null}" 
                               th:href="@{${notif.actionUrl}}" 
                               class="notif-link">View →</a>
                            <form th:action="@{/notifications/{id}/mark-read(id=${notif.id})}" 
                                  method="post" style="display: inline;">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="btn-link">Mark as read</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Read Notifications -->
        <section th:if="${!readNotifications.isEmpty()}" class="notif-section">
            <h2>📭 Read</h2>
            <div class="notif-list">
                <div th:each="notif : ${readNotifications}" class="notif-item">
                    <div class="notif-icon" th:text="${getNotifIcon(notif.type)}">🔔</div>
                    <div class="notif-content">
                        <div class="notif-header">
                            <h3 th:text="${notif.message}">Notification message</h3>
                            <span class="notif-time" th:text="${#temporals.format(notif.createdAt, 'dd MMM, HH:mm')}">Time</span>
                        </div>
                        <span class="notif-type" th:text="${notif.type}">Type</span>
                        <a th:if="${notif.actionUrl != null}" 
                           th:href="@{${notif.actionUrl}}" 
                           class="notif-link">View →</a>
                    </div>
                </div>
            </div>
        </section>

        <!-- Empty State -->
        <div th:if="${allNotifications.isEmpty()}" class="empty-state">
            <div class="empty-icon">🔔</div>
            <h2>No notifications yet</h2>
            <p>When you receive notifications, they'll appear here</p>
        </div>
    </div>
</main>

<script>
function markAllRead() {
    fetch('/notifications/mark-all-read', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRF-TOKEN': document.querySelector('meta[name="_csrf"]').content
        }
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            location.reload();
        }
    });
}

function toggleFilter() {
    const panel = document.getElementById('filter-panel');
    panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
}

function filterNotifications(type) {
    // Update active button
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.remove('active');
    });
    event.target.classList.add('active');
    
    // Filter notifications (simplified - in production, use API)
    const notifItems = document.querySelectorAll('.notif-item');
    notifItems.forEach(item => {
        if (type === 'all') {
            item.style.display = 'flex';
        } else {
            const itemType = item.querySelector('.notif-type').textContent;
            item.style.display = itemType === type ? 'flex' : 'none';
        }
    });
}

function getNotifIcon(type) {
    const icons = {
        'SESSION_REQUEST': '📚',
        'SESSION_ACCEPTED': '✅',
        'SESSION_COMPLETED': '🎉',
        'CREDIT_RECEIVED': '💰',
        'REVIEW_RECEIVED': '⭐',
        'BADGE_EARNED': '🏅',
        'ADMIN_MESSAGE': '📢',
        'DISPUTE_UPDATE': '⚖️'
    };
    return icons[type] || '🔔';
}
</script>

<style>
.notif-header {
    display: flex;
    justify-content: space-between;
    align-items: start;
    margin-bottom: 30px;
}

.notif-header h1 {
    margin-bottom: 5px;
}

.subtitle {
    color: var(--text-secondary);
    font-size: 0.9rem;
}

.notif-actions {
    display: flex;
    gap: 10px;
}

.filter-panel {
    background: var(--card-bg);
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 30px;
    box-shadow: 0 2px 8px var(--shadow);
}

.filter-panel h3 {
    margin-top: 0;
    margin-bottom: 15px;
}

.filter-buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
}

.filter-btn {
    padding: 8px 16px;
    background: var(--bg-secondary);
    border: 2px solid transparent;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.9rem;
    transition: all 0.2s;
}

.filter-btn:hover {
    background: var(--bg-tertiary);
}

.filter-btn.active {
    background: rgba(102, 126, 234, 0.2);
    border-color: rgb(102, 126, 234);
    color: rgb(102, 126, 234);
}

.notif-section {
    margin-bottom: 40px;
}

.notif-section h2 {
    margin-bottom: 20px;
}

.notif-list {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.notif-item {
    background: var(--card-bg);
    padding: 20px;
    border-radius: 12px;
    display: flex;
    gap: 15px;
    box-shadow: 0 2px 8px var(--shadow);
    transition: all 0.2s;
}

.notif-item.unread {
    border-left: 4px solid rgb(102, 126, 234);
    background: rgba(102, 126, 234, 0.05);
}

.notif-item:hover {
    transform: translateX(4px);
}

.notif-icon {
    font-size: 2rem;
    flex-shrink: 0;
    width: 50px;
    height: 50px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg-secondary);
    border-radius: 50%;
}

.notif-content {
    flex: 1;
}

.notif-header {
    display: flex;
    justify-content: space-between;
    align-items: start;
    margin-bottom: 8px;
}

.notif-header h3 {
    margin: 0;
    font-size: 1rem;
    font-weight: 500;
}

.notif-time {
    color: var(--text-tertiary);
    font-size: 0.85rem;
    white-space: nowrap;
}

.notif-type {
    display: inline-block;
    background: var(--bg-secondary);
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 0.75rem;
    color: var(--text-secondary);
    margin-bottom: 8px;
}

.notif-actions-inline {
    display: flex;
    gap: 15px;
    margin-top: 10px;
}

.notif-link {
    color: rgb(102, 126, 234);
    text-decoration: none;
    font-size: 0.9rem;
    font-weight: 500;
}

.notif-link:hover {
    text-decoration: underline;
}

.btn-link {
    background: none;
    border: none;
    color: var(--text-secondary);
    cursor: pointer;
    font-size: 0.9rem;
    padding: 0;
}

.btn-link:hover {
    color: var(--text-primary);
    text-decoration: underline;
}

.empty-state {
    text-align: center;
    padding: 80px 20px;
}

.empty-icon {
    font-size: 5rem;
    margin-bottom: 20px;
    opacity: 0.5;
}

.empty-state h2 {
    margin-bottom: 10px;
}

.empty-state p {
    color: var(--text-secondary);
}

@media (max-width: 768px) {
    .notif-header {
        flex-direction: column;
        gap: 15px;
    }
    
    .notif-item {
        flex-direction: column;
    }
    
    .notif-header {
        flex-direction: column;
        gap: 5px;
    }
}
</style>

</body>
</html>
