<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${pageTitle} + ' — SkillBarter'">SkillBarter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>"/>
    <meta th:name="_csrf" th:content="${_csrf.token}"/>
    <meta th:name="_csrf_header" th:content="${_csrf.headerName}"/>
</head>
<body>

<!-- ── Navigation ─────────────────────────────────────────────────── -->
<nav class="navbar" th:fragment="navbar">
    <div class="nav-inner">
        <a href="/dashboard" class="nav-brand">
            <span class="brand-icon">⚡</span>
            <span class="brand-text">SkillBarter</span>
        </a>

        <div class="nav-links" sec:authorize="isAuthenticated()">
            <a th:href="@{/skills/browse}" class="nav-link">Browse Skills</a>
            <a th:href="@{/sessions}" class="nav-link">My Sessions</a>
            <a th:href="@{/wallet}" class="nav-link">Wallet</a>
            <a th:href="@{/wishlist}" class="nav-link">Wishlist</a>
            <a th:href="@{/analytics}" class="nav-link">Analytics</a>
            <a th:href="@{/ai/chat}" class="nav-link" style="color:var(--primary-lt);">🤖 SkillBot</a>
            <a th:href="@{/disputes}" class="nav-link" sec:authorize="hasAnyRole('VERIFIER','ADMIN')">Tribunal</a>
            <a th:href="@{/admin}" class="nav-link admin-link" sec:authorize="hasRole('ADMIN')">Admin</a>
        </div>

        <div class="nav-actions" sec:authorize="isAuthenticated()">
            <a th:href="@{/notifications}" class="notif-btn" id="notifBtn">
                🔔
                <span class="notif-badge" id="notifCount"
                      th:if="${unreadCount != null and unreadCount > 0}"
                      th:text="${unreadCount}">0</span>
            </a>
            <a th:href="@{/profile}" class="nav-user" sec:authentication="name">user@example.com</a>
            <a th:href="@{/profile}" class="nav-avatar">
                <span class="avatar-initials">U</span>
            </a>
            <form th:action="@{/auth/logout}" method="post" style="display:inline">
                <button type="submit" class="btn btn-ghost btn-sm">Logout</button>
            </form>
        </div>

        <div class="nav-auth" sec:authorize="!isAuthenticated()">
            <a th:href="@{/auth/login}" class="btn btn-ghost">Login</a>
            <a th:href="@{/auth/register}" class="btn btn-primary">Sign Up Free</a>
        </div>
    </div>
</nav>

<!-- ── Flash Messages ──────────────────────────────────────────────── -->
<div th:fragment="flashes">
    <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>
    <div th:if="${infoMsg}"    class="alert alert-info"    th:text="${infoMsg}"></div>
    <div th:if="${errorMsg}"   class="alert alert-error"   th:text="${errorMsg}"></div>
</div>

<!-- ── Footer ─────────────────────────────────────────────────────── -->
<footer th:fragment="footer" class="footer">
    <div class="footer-inner">
        <span class="footer-brand">⚡ SkillBarter</span>
        <span class="footer-copy">UE23CS352B · OOAD Project · Time-Banking Platform</span>
        <div class="footer-links">
            <a href="/leaderboard">Leaderboard</a>
            <a href="/skills/browse">Browse</a>
            <a href="/wallet">Wallet</a>
            <a href="/ai/chat" style="color:var(--primary-lt);">🤖 SkillBot</a>
        </div>
    </div>
</footer>

<!-- ── Floating SkillBot button ───────────────────────────────────── -->
<div th:fragment="skillbot-fab" sec:authorize="isAuthenticated()">
    <a href="/ai/chat" class="skillbot-fab" title="Ask SkillBot">🤖</a>
</div>

<script th:src="@{/js/app.js}"></script>
</body>
</html>
