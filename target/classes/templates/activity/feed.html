<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Activity Feed — SkillBarter</title>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
    <link rel="stylesheet" th:href="@{/css/dark-mode.css}"/>
</head>
<body>
<div th:replace="~{layout :: navbar}"></div>

<main class="page-main">
    <div class="container">
        <h1>📰 Activity Feed</h1>
        <p class="subtitle">Stay updated with what's happening on SkillBarter</p>

        <div class="feed-tabs">
            <button class="feed-tab active" onclick="showTab('my-activity')">My Activity</button>
            <button class="feed-tab" onclick="showTab('platform')">Platform</button>
            <button class="feed-tab" onclick="showTab('trending')">Trending</button>
        </div>

        <!-- My Activity Tab -->
        <div id="my-activity" class="feed-tab-content active">
            <div class="activity-timeline">
                <div th:each="activity : ${myActivities}" class="activity-item">
                    <div class="activity-icon" th:text="${activity.icon}">📚</div>
                    <div class="activity-content">
                        <div class="activity-header">
                            <h3 th:text="${activity.title}">Activity Title</h3>
                            <span class="activity-time" th:text="${#temporals.format(activity.timestamp, 'dd MMM, HH:mm')}">Time</span>
                        </div>
                        <p class="activity-description" th:text="${activity.description}">Description</p>
                        <a th:if="${activity.actionUrl != null}" 
                           th:href="@{${activity.actionUrl}}" 
                           class="activity-link">View Details →</a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Platform Tab -->
        <div id="platform" class="feed-tab-content">
            <div class="activity-timeline">
                <div th:each="activity : ${platformActivities}" class="activity-item">
                    <div class="activity-icon" th:text="${activity.icon}">✅</div>
                    <div class="activity-content">
                        <div class="activity-header">
                            <h3 th:text="${activity.title}">Activity Title</h3>
                            <span class="activity-time" th:text="${#temporals.format(activity.timestamp, 'dd MMM, HH:mm')}">Time</span>
                        </div>
                        <p class="activity-description" th:text="${activity.description}">Description</p>
                        <div class="activity-actor">
                            <a th:href="@{/profile/{id}(id=${activity.actorId})}" 
                               th:text="${activity.actorName}">Actor</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Trending Tab -->
        <div id="trending" class="feed-tab-content">
            <div class="trending-list">
                <div th:each="activity : ${trending}" class="trending-item">
                    <div class="trending-icon" th:text="${activity.icon}">🔥</div>
                    <div class="trending-content">
                        <h3 th:text="${activity.title}">Trending Item</h3>
                        <p th:text="${activity.description}">Description</p>
                        <a th:href="@{${activity.actionUrl}}" class="btn btn-accent btn-sm">
                            Check it out →
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<script>
function showTab(tabName) {
    // Hide all tabs
    document.querySelectorAll('.feed-tab-content').forEach(tab => {
        tab.classList.remove('active');
    });
    document.querySelectorAll('.feed-tab').forEach(btn => {
        btn.classList.remove('active');
    });
    
    // Show selected tab
    document.getElementById(tabName).classList.add('active');
    event.target.classList.add('active');
}
</script>

<style>
.subtitle {
    color: var(--text-secondary);
    margin-bottom: 30px;
}

.feed-tabs {
    display: flex;
    gap: 10px;
    margin-bottom: 30px;
    border-bottom: 2px solid var(--border-color);
}

.feed-tab {
    padding: 12px 24px;
    background: none;
    border: none;
    border-bottom: 3px solid transparent;
    cursor: pointer;
    font-size: 1rem;
    font-weight: 500;
    color: var(--text-secondary);
    transition: all 0.2s;
}

.feed-tab:hover {
    color: var(--text-primary);
}

.feed-tab.active {
    color: rgb(102, 126, 234);
    border-bottom-color: rgb(102, 126, 234);
}

.feed-tab-content {
    display: none;
}

.feed-tab-content.active {
    display: block;
}

.activity-timeline {
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.activity-item {
    background: var(--card-bg);
    padding: 20px;
    border-radius: 12px;
    display: flex;
    gap: 15px;
    box-shadow: 0 2px 8px var(--shadow);
    transition: transform 0.2s;
}

.activity-item:hover {
    transform: translateX(4px);
}

.activity-icon {
    font-size: 2rem;
    flex-shrink: 0;
    width: 50px;
    height: 50px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg-secondary);
    border-radius: 50%;
}

.activity-content {
    flex: 1;
}

.activity-header {
    display: flex;
    justify-content: space-between;
    align-items: start;
    margin-bottom: 8px;
}

.activity-header h3 {
    margin: 0;
    font-size: 1.1rem;
}

.activity-time {
    color: var(--text-tertiary);
    font-size: 0.85rem;
}

.activity-description {
    color: var(--text-secondary);
    margin: 0 0 10px 0;
    font-size: 0.95rem;
}

.activity-link {
    color: rgb(102, 126, 234);
    text-decoration: none;
    font-size: 0.9rem;
    font-weight: 500;
}

.activity-link:hover {
    text-decoration: underline;
}

.activity-actor {
    margin-top: 8px;
    font-size: 0.85rem;
}

.activity-actor a {
    color: rgb(102, 126, 234);
    text-decoration: none;
    font-weight: 500;
}

.activity-actor a:hover {
    text-decoration: underline;
}

.trending-list {
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.trending-item {
    background: linear-gradient(135deg, rgba(255, 107, 107, 0.1) 0%, rgba(255, 154, 158, 0.1) 100%);
    padding: 25px;
    border-radius: 12px;
    display: flex;
    gap: 20px;
    align-items: center;
    border: 2px solid rgba(255, 107, 107, 0.3);
}

.trending-icon {
    font-size: 3rem;
    flex-shrink: 0;
}

.trending-content {
    flex: 1;
}

.trending-content h3 {
    margin: 0 0 8px 0;
    font-size: 1.25rem;
}

.trending-content p {
    color: var(--text-secondary);
    margin: 0 0 12px 0;
}

@media (max-width: 768px) {
    .feed-tabs {
        overflow-x: auto;
    }
    
    .activity-item {
        flex-direction: column;
    }
    
    .activity-header {
        flex-direction: column;
        gap: 5px;
    }
}
</style>

</body>
</html>
