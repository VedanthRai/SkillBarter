<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Raise Dispute — SkillBarter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<div th:replace="~{layout :: navbar}"></div>
<main class="page-main">
<div class="container container--narrow">
    <div th:replace="~{layout :: flashes}"></div>
    <h1 style="margin-bottom:8px;">⚖️ Raise a Dispute</h1>
    <p style="color:var(--text-muted);margin-bottom:28px;">
        A verifier will be assigned to review your case. Credits remain in escrow until resolved.
    </p>

    <div class="session-detail-card">
        <form th:action="@{/disputes/raise/{id}(id=${sessionId})}" method="post"
              th:object="${disputeDto}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="form-group">
                <label for="description">Describe the issue *</label>
                <textarea id="description" th:field="*{description}" rows="5"
                          placeholder="Explain clearly what went wrong. The more detail, the better."></textarea>
                <span class="field-error" th:if="${#fields.hasErrors('description')}"
                      th:errors="*{description}"></span>
            </div>

            <div class="form-group">
                <label for="evidence">Supporting Evidence <small>(optional — URLs or file names)</small></label>
                <textarea id="evidence" th:field="*{evidence}" rows="3"
                          placeholder="Links to screenshots, recordings, or relevant files…"></textarea>
            </div>

            <div style="display:flex;gap:12px;margin-top:8px;">
                <button type="submit" class="btn btn-accent">
                    Submit Dispute →
                </button>
                <a th:href="@{/sessions/{id}(id=${sessionId})}" class="btn btn-ghost">Cancel</a>
            </div>
        </form>
    </div>
</div>
</main>
<div th:replace="~{layout :: footer}"></div>
<div th:replace="~{layout :: skillbot-fab}"></div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
