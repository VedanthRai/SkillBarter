<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${profile.user.username} + ' — SkillBarter'">Profile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<div th:replace="~{layout :: navbar}"></div>
<main class="page-main">
<div class="container">
    <div th:replace="~{layout :: flashes}"></div>

    <!-- Profile header -->
    <div class="profile-hero">
        <div class="profile-avatar-lg"
             th:text="${profile.user.username.substring(0,1).toUpperCase()}">U</div>
        <div class="profile-info">
            <h1 th:text="${profile.user.username}">Username</h1>
            <p class="profile-trust-label" th:text="${profile.getTrustLabel()}">Member</p>
            <p class="profile-bio" th:if="${profile.user.bio != null}"
               th:text="${profile.user.bio}">bio</p>
            <p class="profile-rating" th:text="${profile.getFormattedRating()}">No ratings</p>
            <p class="profile-streak" th:text="${profile.getStreakDisplay()}">streak</p>
        </div>
        <div class="profile-actions" th:if="${isOwner}">
            <a th:href="@{/profile/edit}" class="btn btn-ghost">Edit Profile</a>
            <a th:href="@{/skills/my}" class="btn btn-primary">Manage Skills</a>
        </div>
    </div>

    <!-- Badges -->
    <div th:if="${!#lists.isEmpty(profile.badges)}" class="dash-section">
        <h2 class="section-title">🏅 Badges</h2>
        <div style="display:flex;flex-wrap:wrap;gap:10px;">
            <div th:each="badge : ${profile.badges}" class="badge-card">
                <div class="badge-name" th:text="${badge.badgeName}">badge</div>
                <div class="badge-desc" th:text="${badge.description}">desc</div>
                <div class="badge-date"
                     th:text="'Awarded ' + ${#temporals.format(badge.awardedAt,'dd MMM yyyy')}">date</div>
            </div>
        </div>
    </div>

    <!-- Wallet (owner only) -->
    <div th:if="${isOwner}" class="stats-grid" style="margin-bottom:28px;">
        <div class="stat-card stat-card--credits">
            <div class="stat-icon">💰</div>
            <div class="stat-body">
                <div class="stat-val" th:text="${#numbers.formatDecimal(profile.user.creditBalance,1,2)}">0</div>
                <div class="stat-label">Credit Balance</div>
            </div>
        </div>
        <div class="stat-card stat-card--sessions">
            <div class="stat-icon">✅</div>
            <div class="stat-body">
                <div class="stat-val" th:text="${profile.user.totalSessionsCompleted}">0</div>
                <div class="stat-label">Sessions Done</div>
            </div>
        </div>
        <div class="stat-card stat-card--rep">
            <div class="stat-icon">⭐</div>
            <div class="stat-body">
                <div class="stat-val" th:text="${profile.user.reputationScore}">0</div>
                <div class="stat-label">Reputation</div>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">📈</div>
            <div class="stat-body">
                <div class="stat-val" th:text="${#numbers.formatDecimal(totalEarned,1,2)}">0.00</div>
                <div class="stat-label">Total Earned</div>
            </div>
        </div>
    </div>

    <div class="dash-two-col">
        <!-- Skills offered -->
        <section class="dash-section">
            <h2 class="section-title">🎓 Skills Offered</h2>
            <div th:if="${#lists.isEmpty(skills)}" class="empty-state">No skills yet.</div>
            <div th:each="s : ${skills}" th:if="${s.isOffering}" class="session-mini-card">
                <div style="flex:1">
                    <strong th:text="${s.name}">skill</strong>
                    <span th:if="${s.verified}" class="verified-chip">✅</span>
                    <div style="font-size:12px;color:var(--text-muted)" th:text="${s.category}">cat</div>
                </div>
                <span class="lb-score" th:text="${#numbers.formatDecimal(s.hourlyRate,1,1)} + ' cr/hr'">1.0</span>
                <a th:if="${!isOwner}" th:href="@{/sessions/request/{id}(id=${s.id})}"
                   class="btn btn-primary btn-xs">Book</a>
            </div>
        </section>

        <!-- Reviews received -->
        <section class="dash-section">
            <h2 class="section-title">💬 Reviews</h2>
            <div th:if="${#lists.isEmpty(reviews)}" class="empty-state">No reviews yet.</div>
            <div th:each="r : ${reviews}" class="review-mini">
                <div class="review-stars-mini">
                    <span th:each="i : ${#numbers.sequence(1,5)}"
                          th:classappend="${i <= r.rating} ? 'star-on' : 'star-off'">★</span>
                </div>
                <p th:text="${r.comment}" class="review-mini-text">comment</p>
                <div class="review-mini-meta">
                    by <strong th:text="${r.reviewer.username}">user</strong> ·
                    <span th:text="${#temporals.format(r.createdAt,'MMM yyyy')}">date</span>
                </div>
            </div>
        </section>
    </div>
</div>
</main>
<div th:replace="~{layout :: footer}"></div>
<div th:replace="~{layout :: skillbot-fab}"></div>
<script th:src="@{/js/app.js}"></script>

<style>
.profile-hero {
  display:flex; align-items:flex-start; gap:28px;
  padding:32px; background:var(--surface);
  border:1px solid var(--border); border-radius:var(--radius-xl);
  margin-bottom:28px;
}
.profile-avatar-lg {
  width:80px; height:80px; border-radius:50%;
  background:var(--primary); display:flex;
  align-items:center; justify-content:center;
  font-family:var(--font-display); font-size:32px; font-weight:800;
  color:#fff; flex-shrink:0;
}
.profile-info { flex:1; }
.profile-info h1 { font-size:28px; margin-bottom:4px; }
.profile-trust-label { color:var(--accent); font-weight:600; margin-bottom:8px; }
.profile-bio { color:var(--text-muted); margin-bottom:6px; font-size:14px; }
.profile-rating, .profile-streak { font-size:13px; color:var(--text-muted); }
.badge-card {
  background:rgba(99,102,241,0.08); border:1px solid rgba(99,102,241,0.25);
  border-radius:var(--radius); padding:12px 16px; min-width:180px;
}
.badge-name { font-weight:600; font-size:14px; margin-bottom:4px; }
.badge-desc { font-size:12px; color:var(--text-muted); margin-bottom:4px; }
.badge-date { font-size:11px; color:var(--text-dim); }
.review-mini { padding:12px 0; border-bottom:1px solid var(--border); }
.review-mini:last-child { border-bottom:none; }
.review-stars-mini { font-size:14px; margin-bottom:4px; }
.review-mini-text { font-size:13px; color:var(--text-muted); margin-bottom:4px; }
.review-mini-meta { font-size:12px; color:var(--text-dim); }
</style>
</body>
</html>
